name: HAVEN Supabase Integration
on:
  workflow_dispatch:
  schedule:
    - cron: '15 3 * * *'

jobs:
  supabase-local-reset:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - run: corepack enable
      - run: corepack pnpm install --frozen-lockfile
      - run: docker --version
      - run: ./scripts/ci/verify-local-supabase.sh

  live-rls:
    runs-on: ubuntu-latest
    needs: supabase-local-reset
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      HAVEN_TEST_ELDER_JWT: ${{ secrets.HAVEN_TEST_ELDER_JWT }}
      HAVEN_TEST_FAMILY_JWT: ${{ secrets.HAVEN_TEST_FAMILY_JWT }}
      HAVEN_TEST_UNRELATED_JWT: ${{ secrets.HAVEN_TEST_UNRELATED_JWT }}
      HAVEN_TEST_ELDER_ID: ${{ secrets.HAVEN_TEST_ELDER_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: corepack enable
      - run: corepack pnpm install --frozen-lockfile
      - id: secrets_gate
        shell: bash
        run: |
          missing=0
          for name in SUPABASE_URL SUPABASE_ANON_KEY HAVEN_TEST_ELDER_JWT HAVEN_TEST_FAMILY_JWT HAVEN_TEST_UNRELATED_JWT HAVEN_TEST_ELDER_ID; do
            if [ -z "${!name:-}" ]; then
              echo "::notice::Skipping live RLS because $name is not configured"
              missing=1
            fi
          done
          if [ "$missing" -eq 0 ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.secrets_gate.outputs.ready == 'true'
        run: HAVEN_LIVE_RLS=1 corepack pnpm run test:integration:live
      - if: steps.secrets_gate.outputs.ready != 'true'
        run: echo "Live RLS job skipped because required secrets are not configured."
