    care:{visits:[{date:'2026-06-11', carer:'Nurse Eva', note:{en:'Medication review completed. Mood calm.',nl:'Medicatiecontrole afgerond. Stemming rustig.'}}], incidents:[{level:'low', title:{en:'Rug edge noted in hallway',nl:'Rand van kleed in gang opgemerkt'}, resolved:true}]},
    flags:{companion:true, safeZone:true, buurt:true, watch:true, psd2:true, medmij:true, offline:true}
  });
  const storeKey='haven-suite-state-v1';
  const load=()=>{try{const s=JSON.parse(localStorage.getItem(storeKey));return s&&s.version===VERSION?s:seed()}catch{return seed()}};
  let state=load();
  const save=()=>localStorage.setItem(storeKey, JSON.stringify(state));
  const bus=new EventTarget();
  const tr=k=>I18N[state.lang][k]||I18N.en[k]||k;
  const local=v=> typeof v==='object'&&v ? (v[state.lang]||v.en||'') : (v ?? '');
  const nowPeriod=()=>{const h=new Date().getHours();return h<12?'morning':h<18?'afternoon':h<22?'evening':'night'};
  const notify=(msg,type='sage')=>{state.notifications.unshift({id:'n-'+Date.now(), msg, type, at:new Date().toISOString()}); save(); const el=document.getElementById('toast'); el.textContent=msg; el.style.borderLeftColor=type==='rose'?'var(--rose)':type==='amber'?'var(--amber)':'var(--sage)'; el.classList.add('show'); clearTimeout(notify.t); notify.t=setTimeout(()=>el.classList.remove('show'),2300)};
  const api={
    confirmMedication(id){const m=state.medications.find(x=>x.id===id)||state.medications.find(x=>x.status!=='taken'); if(m){m.status='taken'; m.confirmedAt=new Date().toISOString(); state.notifications.unshift({id:'n-med',msg:tr('medicationSaved'),type:'sage'}); save(); bus.dispatchEvent(new Event('change')); notify(tr('medicationSaved'))}},
    snoozeMedication(id){const m=state.medications.find(x=>x.id===id)||state.medications.find(x=>x.status!=='taken'); if(m){m.time='08:15'; save(); bus.dispatchEvent(new Event('change')); notify(tr('snoozed'),'amber')}},
    sendHeart(){state.messages.unshift({id:'msg-'+Date.now(),from:'Margaret',kind:'heart',body:{en:'Margaret is thinking of you 💙',nl:'Margaret denkt aan u 💙'},unread:false}); save(); bus.dispatchEvent(new Event('change')); notify(tr('sent'))},
    recordStory(){state.stories.unshift({id:'story-'+Date.now(), title:{en:'A summer memory at the seaside',nl:'Een zomerherinnering aan zee'}, minutes:3, status:'transcribed'}); save(); bus.dispatchEvent(new Event('change')); notify(tr('saved'))},
    scanDocument(){state.documents.unshift({id:'doc-'+Date.now(), type:'GP letter', label:{en:'GP letter about annual check-up',nl:'Huisartsbrief over jaarlijkse controle'}, secure:true, summary:{en:'This letter confirms an annual check-up next month and lists current medicines.',nl:'Deze brief bevestigt een jaarlijkse controle volgende maand en noemt huidige medicijnen.'}}); save(); bus.dispatchEvent(new Event('change')); notify(tr('generated'))},
    scamSignal(raw='bank helpdesk urgent pin transfer'){const s=raw.toLowerCase(); let score=0; ['bank','urgent','pin','transfer','gift card','code','do not tell','remote'].forEach(p=>{if(s.includes(p))score+=14}); score=Math.min(98,score); const level=score>=90?'black':score>=70?'red':score>=40?'amber':'none'; state.shieldStatus=level==='none'?'safe':level==='black'?'red':level; const ev={id:'scam-'+Date.now(),level,channel:'phone',score,explanation:{en:`The caller asked for banking action and used time pressure. Composite score ${score}.`,nl:`De beller vroeg om bankactie en zette tijdsdruk. Composietscore ${score}.`},notified:level==='red'||level==='black'}; state.scamEvents.unshift(ev); if(ev.notified) state.notifications.unshift({id:'n-scam', msg:tr('familyNotified'), type:'rose'}); save(); bus.dispatchEvent(new Event('change')); notify(local(ev.explanation), level==='amber'?'amber':'rose')},
    buurtRequest(){state.buurt.connections+=1; state.notifications.unshift({id:'n-buurt', msg: state.lang==='en'?'Walk buddy introduction request sent privately.':'Verzoek voor wandelmaatje privé verstuurd.', type:'sage'}); save(); bus.dispatchEvent(new Event('change')); notify(tr('sent'))},
    logVisit(){state.care.visits.unshift({date:'2026-06-11',carer:'Nurse Eva',note:{en:'Hydration checked, safe zone consent reviewed, no urgent concerns.',nl:'Hydratatie gecontroleerd, veilige-zone toestemming besproken, geen dringende zorgen.'}}); save(); bus.dispatchEvent(new Event('change')); notify(tr('saved'))},
    setMode(mode){state.mode=mode; save(); render()}, setScreen(screen){state.screen=screen; save(); render()}, toggleLang(){state.lang=state.lang==='en'?'nl':'en'; save(); render()}, toggleContrast(){state.contrast=!state.contrast; save(); render()}, bumpFont(){state.fontScale= state.fontScale>=1.35 ? 1 : +(state.fontScale+.12).toFixed(2); save(); render()}
  };
  const h=(tag, cls='', html='')=>`<${tag}${cls?` class="${cls}"`:''}>${html}</${tag}>`;
  const row=(icon,title,sub,meta='')=>`<div class="row"><div class="rowIcon">${icon}</div><div class="rowBody"><strong>${title}</strong><span>${sub}</span></div>${meta?`<div class="rowMeta">${meta}</div>`:''}</div>`;
  const btn=(label, action, cls='')=>`<button class="bigButton ${cls}" data-action="${action}">${label}</button>`;
  const switcher=(on, action)=>`<button class="switch ${on?'on':''}" data-action="${action}" aria-label="toggle"></button>`;
  function renderHome(){const pending=state.medications.filter(m=>m.status!=='taken').length; const unread=state.messages.filter(m=>m.unread).length; return `
    <div class="hero"><h2 class="greeting">${tr(nowPeriod())},<br>${state.profiles.elder.preferred}</h2><p class="date">${tr('todayDate')} · ${tr('weather')}</p><div class="haloRow ${state.shieldStatus==='safe'?'':state.shieldStatus==='amber'?'amber':'red'}"><span>${state.shieldStatus==='safe'?tr('safe'):state.shieldStatus==='amber'?tr('unusual'):tr('attention')}</span><span class="halo"></span></div></div>
    <div class="tileGrid">
      <button class="tile" data-screen="pills"><span class="ico">💊</span><div><h3>${tr('myPills')}</h3><p>${pending} ${tr('dueToday')}</p></div>${pending?`<b class="badge">${pending}</b>`:''}</button>
      <button class="tile" data-screen="today"><span class="ico">📅</span><div><h3>${tr('todayTile')}</h3><p>${state.tasks.length} ${tr('items')}</p></div></button>
      <button class="tile" data-screen="family"><span class="ico">👪</span><div><h3>${tr('familyTile')}</h3><p>${unread} ${tr('message')}</p></div>${unread?`<b class="badge">${unread}</b>`:''}</button>
      <button class="tile danger" data-screen="kompas"><span class="ico">🆘</span><div><h3>${tr('helpTile')}</h3><p>${tr('callSarah')}</p></div></button>
    </div>
    <div class="sectionTitle">${tr('suite')}<small>${tr('exact')}</small></div>
    <div class="featureList">
      ${feature('🛡️','SCHILD',tr('shieldCenter'),'shield')}${feature('🎙️','STEM',tr('voiceCompanion'),'stem')}${feature('🧭','KOMPAS',tr('safeZone'),'kompas')}${feature('🤝','KRING / BUURT',tr('buurtTitle'),'family')}${feature('🧑‍⚕️','WACHT',tr('carerPortal'),'wacht')}${feature('⚙️',tr('settings'),tr('backend'),'settings')}
    </div>`}
  function feature(icon,title,sub,screen){return `<button class="feature" data-screen="${screen}"><i>${icon}</i><div><b>${title}</b><span>${sub}</span></div><span style="margin-left:auto;color:var(--sage);font-weight:1000">✓</span></button>`}
  function renderToday(){return `<div class="sectionTitle">${tr('today')}<small>${tr('hearBrief')}</small></div><div class="card sage">${row('☀️',tr('todayDate'),tr('weather'))}${state.tasks.map(t=>row(t.icon,local(t.title),`${t.time} · ${t.source}`, t.done?'✓':'')).join('')}${row('💬',state.messages[0].from,local(state.messages[0].body))}</div>${btn('🔊 '+tr('hearBrief'),'brief')}${btn('🎤 '+tr('addReminder'),'addTask','secondary')}<div class="sectionTitle">${tr('wellbeing')}</div><div class="miniGrid"><div class="miniCard"><b>4.1/5</b><span>Mood average</span></div><div class="miniCard"><b>94%</b><span>${tr('adherence')}</span></div><div class="miniCard"><b>6</b><span>${tr('messages')}</span></div><div class="miniCard"><b>${state.location.last}</b><span>${tr('location')}</span></div></div>`}
  function renderPills(){const current=state.medications.find(m=>m.status!=='taken'); return `<div class="sectionTitle">${tr('nextUp')}<small>${state.medications.filter(m=>m.status==='taken').length}/${state.medications.length} ${tr('taken')}</small></div>${current?`<div class="card"><div style="text-align:center;font-weight:1000;font-size:54px;color:var(--slate);letter-spacing:-2px">${current.time}</div><div style="width:86px;height:34px;border-radius:20px;background:#fff3cf;border:2px solid #e4d5a5;margin:8px auto 14px"></div><h2 style="text-align:center;margin:0;font-size:24px">${current.name} ${current.dose}</h2><p style="text-align:center;color:var(--pewter);font-weight:800">${local(current.desc)}</p>${btn('✓ '+tr('tookIt'),`take:${current.id}`,'sage')}${btn('⏰ '+tr('notYet'),`snooze:${current.id}`,'secondary')}</div>`:`<div class="card sage"><h2>${tr('allDone')}</h2><p>${tr('allDoneBody')}</p></div>`}<div class="sectionTitle">${tr('laterToday')}</div><div class="card">${state.medications.map(m=>row('💊',`${m.name} ${m.dose}`,local(m.desc), m.status==='taken'?tr('taken'):m.time)).join('')}</div>${btn('🔊 '+tr('tellPills'),'tellPills','secondary')}`}
  function renderShield(){const ev=state.scamEvents[0]; return `<div class="tabs"><button class="tab active">${tr('shieldCenter')}</button><button class="tab">${tr('vault')}</button><button class="tab">${tr('transaction')}</button><button class="tab">${tr('coach')}</button></div><div class="card ${ev.level==='amber'?'amber':ev.level==='red'||ev.level==='black'?'rose':''}"><div class="miniGrid"><div class="miniCard"><b>${ev.score}</b><span>${tr('score')}</span></div><div class="miniCard"><b>${tr(ev.level==='red'?'red':ev.level==='black'?'black':ev.level==='amber'?'amber':'active')}</b><span>${tr('risk')}</span></div></div><h2>${local(ev.explanation)}</h2><p style="color:var(--graphite);font-weight:800">${tr('calm')}: ${ev.level==='amber'?tr('explain'):tr('callFamily')}</p>${btn('☎️ '+tr('simulateCall'),'simulateScam', ev.level==='red'?'rose':'amber')}${btn('👪 '+tr('callFamily'),'callFamily','secondary')}${btn('✓ '+tr('trust'),'trust','ghost')}</div><div class="sectionTitle">${tr('vault')}</div><div class="card">${state.documents.map(d=>row('📄',local(d.label),`${d.type} · ${d.secure?tr('stored'):tr('saved')}`,'✓')).join('')}${btn('📷 '+tr('scanDoc'),'scanDoc','secondary')}</div><div class="sectionTitle">${tr('transaction')}</div><div class="card teal">${row('💶','ABN AMRO · **** 4821','PSD2 read-only anomaly guard',tr('active'))}${row('🧾','€450 new payee simulation','Would become black level when paired with scam call',tr('pending'))}</div>`}
  function renderFamily(){return `<div class="tabs"><button class="tab active">${tr('familyBridge')}</button><button class="tab">${tr('lifeStory')}</button><button class="tab">${tr('buurt')}</button></div><div class="card violet">${row('👩',state.profiles.family.name,'Primary family contact · consented',tr('active'))}${row('👦','Lucas','Grandchild video bridge',tr('active'))}${btn('💙 '+tr('sendHeart'),'sendHeart')}${btn('🎙️ '+tr('recordStory'),'recordStory','secondary')}</div><div class="sectionTitle">${tr('messages')}</div><div class="card">${state.messages.slice(0,3).map(m=>row(m.kind==='video'?'🎥':m.kind==='heart'?'💙':'💬',m.from,local(m.body),m.unread?'•':'')).join('')}</div><div class="sectionTitle">${tr('buurtTitle')}<small>${tr('private')}</small></div><div class="card teal">${row('🏘️',`${state.buurt.nearby} HAVEN users nearby`,state.buurt.tags.join(' · '),tr('optIn'))}${row('🚶',`${state.buurt.matches} walk buddy matches`,'Identity hidden until double opt-in',tr('noPrecise'))}${state.buurt.events.map(e=>row('📚',local(e.title),`${e.distance} · ${e.date}`,tr('open'))).join('')}${btn('🚶 '+tr('findWalk'),'buurtRequest','sage')}${btn('🤝 '+tr('requestIntro'),'buurtRequest','secondary')}</div>`}
  function renderKompas(){return `<div class="sectionTitle">${tr('safeZone')}<small>${tr('noPrecise')}</small></div><div class="map"><div class="zone">${tr('safeZone')}</div><div class="pin"></div></div><div class="card">${row('📍',state.location.label,`${state.location.fuzzed} · ${state.location.last}`,state.location.safe?tr('active'):tr('attention'))}${row('🌙',tr('nightMode'),'22:00–08:00 bedside mode',state.location.nightMode?tr('enabled'):tr('disabled'))}${row('🚑',tr('emergencyProfile'),'Allergies, medicines, GP, QR/NFC emergency card',tr('active'))}${btn('📞 '+tr('callSarah'),'callFamily','rose')}${btn('📷 '+tr('whatIsThis'),'scanDoc','secondary')}</div><div class="sectionTitle">${tr('wellnessCheck')}</div><div class="miniGrid"><button class="miniCard" data-action="well:5"><b>😊</b><span>Great</span></button><button class="miniCard" data-action="well:3"><b>😐</b><span>Okay</span></button><button class="miniCard" data-action="well:2"><b>😔</b><span>Not great</span></button><button class="miniCard" data-action="cognitive"><b>🧠</b><span>${tr('quickQuestion')}</span></button></div>`}
  function renderStem(){return `<div class="voiceOrb">⌁</div><h2 style="text-align:center;margin:0;font-size:28px">${tr('voiceCompanion')}</h2><p style="text-align:center;color:var(--pewter);font-weight:800">${state.lang==='en'?'A transparent digital helper with persistent memory.':'Een transparante digitale hulp met blijvend geheugen.'}</p><div class="transcript"><div class="bubble me">${state.lang==='en'?'How are my roses doing?':'Hoe gaat het met mijn rozen?'}</div><div class="bubble haven">${state.lang==='en'?'You told me they bloom best after lunch light. Would you like a reminder to water them today?':'U vertelde dat ze het beste bloeien in middaglicht. Wilt u vandaag een waterherinnering?'}</div></div>${btn('🎙️ '+tr('askHaven'),'voice')}${btn('🛟 '+tr('crisis'),'crisis','secondary')}<div class="sectionTitle">${tr('memory')}</div><div class="card story">${state.memory.map(m=>row('🧠',m.type,local(m.text),tr('stored'))).join('')}</div>`}
  function renderWacht(){return `<div class="seg"><button data-mode="elder" class="${state.mode==='elder'?'active':''}">${tr('elderMode')}</button><button data-mode="family" class="${state.mode==='family'?'active':''}">${tr('familyMode')}</button><button data-mode="carer" class="${state.mode==='carer'?'active':''}">${tr('carerMode')}</button></div>${state.mode==='family'?renderFamilyDashboard():state.mode==='carer'?renderCarer():renderElderSuiteStatus()}`}
  function renderFamilyDashboard(){return `<div class="sectionTitle">${tr('dashboard')}<small>${state.profiles.elder.name}</small></div><div class="card"><div class="miniGrid"><div class="miniCard"><b>${state.medications.filter(m=>m.status==='taken').length}/${state.medications.length}</b><span>${tr('pills')}</span></div><div class="miniCard"><b>${state.scamEvents[0].score}</b><span>${tr('shield')}</span></div><div class="miniCard"><b>${state.buurt.connections}</b><span>${tr('buurt')}</span></div><div class="miniCard"><b>${state.location.last}</b><span>${tr('location')}</span></div></div></div><div class="card">${row('🛡️',tr('notifications'),state.notifications[0]?.msg||tr('safe'),tr('open'))}${row('📈',tr('digest'),'Safety, meds, wellness and family contact',tr('generated'))}${row('🔐',tr('privacy'),tr('consent'),tr('active'))}</div>`}
  function renderCarer(){return `<div class="sectionTitle">${tr('carerPortal')}<small>${state.profiles.carer.org}</small></div><div class="card teal">${row('👩‍⚕️',state.profiles.carer.name,'Role-scoped access · WGBO retention',tr('active'))}${state.care.visits.map(v=>row('📝',`${tr('visitLogs')} · ${v.date}`,local(v.note),tr('saved'))).join('')}${btn('＋ '+tr('visitLogs'),'logVisit','sage')}</div><div class="card amber">${state.care.incidents.map(i=>row('⚠️',local(i.title),`${tr('incident')} · ${i.level}`,i.resolved?tr('resolved'):tr('pending'))).join('')}${row('📋',tr('carePlan'),'Medication, hydration, mobility, visit notes',tr('active'))}</div>`}
  function renderElderSuiteStatus(){return `<div class="sectionTitle">${tr('suite')}<small>${tr('noUiGaps')}</small></div><div class="card sage">${row('✅',tr('backend'),tr('allFeatures'),tr('active'))}${row('📱',tr('exact'),'390×844 optimized iPhone viewport',tr('completed'))}${row('🌍',tr('language'),`${tr('english')} / ${tr('dutch')}`,tr('active'))}</div>`}
  function renderSettings(){return `<div class="sectionTitle">${tr('settings')}</div><div class="card">${row('🌍',tr('language'),state.lang==='en'?tr('english'):tr('dutch'),`<button class="tab active" data-action="lang">${state.lang==='en'?'NL':'EN'}</button>`)}<div class="row"><div class="rowIcon">◐</div><div class="rowBody"><strong>${tr('highContrast')}</strong><span>${state.contrast?tr('enabled'):tr('disabled')}</span></div>${switcher(state.contrast,'contrast')}</div><div class="row"><div class="rowIcon">Aa</div><div class="rowBody"><strong>${tr('fontSize')}</strong><span>${Math.round(state.fontScale*100)}%</span></div><button class="tab active" data-action="font">Aa+</button></div></div><div class="sectionTitle">${tr('privacy')}</div><div class="card">${Object.entries(state.flags).map(([k,v])=>`<div class="row"><div class="rowIcon">${v?'✓':'○'}</div><div class="rowBody"><strong>${k}</strong><span>${v?tr('enabled'):tr('disabled')}</span></div><div class="rowMeta">${tr('consent')}</div></div>`).join('')}</div><button class="bigButton rose" data-action="reset">Reset demo data</button>`}
  function setTitle(){document.getElementById('appSub').textContent=tr('sub'); document.getElementById('appTitle').textContent=state.screen==='home'?'HAVEN':({today:tr('today'),pills:tr('pills'),shield:'SCHILD',family:'KRING',kompas:'KOMPAS',stem:'STEM',wacht:'WACHT',settings:tr('settings')}[state.screen]||'HAVEN'); document.getElementById('langBtn').textContent=state.lang==='en'?'NL':'EN'}
  function renderNav(){const nav=[['home','⌂',tr('home')],['today','📅',tr('today')],['pills','💊',tr('pills')],['family','👪',tr('family')],['shield','🛡️',tr('shield')]]; document.getElementById('bottomNav').innerHTML=nav.map(n=>`<button class="navBtn ${state.screen===n[0]?'active':''}" data-screen="${n[0]}"><b>${n[1]}</b><span>${n[2]}</span></button>`).join('')}
  function render(){document.documentElement.style.setProperty('--fontScale', state.fontScale); document.getElementById('app').classList.toggle('hc',state.contrast); setTitle(); renderNav(); const map={home:renderHome,today:renderToday,pills:renderPills,shield:renderShield,family:renderFamily,kompas:renderKompas,stem:renderStem,wacht:renderWacht,settings:renderSettings}; document.getElementById('content').innerHTML=(map[state.screen]||renderHome)(); bind()}
  function showModal(html){document.getElementById('modalBody').innerHTML=html; document.getElementById('modal').classList.add('show')}
  function handleAction(a){if(!a)return; if(a.startsWith('take:'))return api.confirmMedication(a.split(':')[1]); if(a.startsWith('snooze:'))return api.snoozeMedication(a.split(':')[1]); if(a==='simulateScam')return api.scamSignal(); if(a==='scanDoc')return api.scanDocument(); if(a==='sendHeart')return api.sendHeart(); if(a==='recordStory')return api.recordStory(); if(a==='buurtRequest')return api.buurtRequest(); if(a==='logVisit')return api.logVisit(); if(a==='lang')return api.toggleLang(); if(a==='contrast')return api.toggleContrast(); if(a==='font')return api.bumpFont(); if(a==='reset'){localStorage.removeItem(storeKey);state=seed();return render()} if(a==='brief')return showModal(`<h2>${tr('today')}</h2><p>${state.lang==='en'?'Good morning, Margaret. Your blood sugar pill is due at 8. You have a GP appointment at 2. Sarah sent a message.':'Goedemorgen Margaret. Uw bloedsuikerpil is om 8 uur. U heeft om 2 uur een huisartsafspraak. Sarah stuurde een bericht.'}</p>${btn(tr('close'),'close','secondary')}`); if(a==='voice')return showModal(`<h2>${tr('askHaven')}</h2><p>${state.lang==='en'?'HAVEN heard: “I took my pill and I feel okay.” The backend intent classifier would update medication and wellness records.':'HAVEN hoorde: “Ik heb mijn pil genomen en voel me goed.” De backend intentclassificatie werkt medicatie en welzijn bij.'}</p>`); if(a==='crisis')return showModal(`<h2>${tr('crisis')}</h2><p>${state.lang==='en'?'Crisis phrases create a high-priority family notification and show emergency options immediately.':'Crisiszinnen maken direct een melding met hoge prioriteit voor familie en tonen noodopties.'}</p>`); if(a==='callFamily')return notify(state.lang==='en'?'Calling Sarah together…':'Sarah wordt samen gebeld…','rose'); if(a==='trust'){state.shieldStatus='safe'; save(); render(); return notify(state.lang==='en'?'Marked trusted with audit record.':'Als vertrouwd gemarkeerd met auditrecord.')} if(a==='addTask')return showModal(`<h2>${tr('addReminder')}</h2><p>${state.lang==='en'?'Voice-created task: “Call the pharmacy tomorrow morning.” Saved to tasks and synced for family visibility.':'Spraaktaak: “Bel morgenochtend de apotheek.” Opgeslagen en gesynchroniseerd voor familie.'}</p>`); if(a==='tellPills')return showModal(`<h2>${tr('myPills')}</h2><p>${state.medications.map(m=>`${m.time} — ${m.name}, ${local(m.desc)}`).join('<br>')}</p>`); if(a==='cognitive')return showModal(`<h2>${tr('quickQuestion')}</h2><p>${state.lang==='en'?'What day of the week is it today? This is logged gently as a cognitive check-in trend, never as a judgement.':'Welke dag van de week is het vandaag? Dit wordt rustig als cognitieve trend opgeslagen, nooit als oordeel.'}</p>`); if(a.startsWith('well:'))return notify(state.lang==='en'?'Wellness check-in saved.':'Welzijnscheck opgeslagen.') ; if(a==='close')return document.getElementById('modal').classList.remove('show')}
  function bind(){document.querySelectorAll('[data-screen]').forEach(el=>el.onclick=()=>api.setScreen(el.dataset.screen)); document.querySelectorAll('[data-action]').forEach(el=>el.onclick=()=>handleAction(el.dataset.action)); document.querySelectorAll('[data-mode]').forEach(el=>el.onclick=()=>api.setMode(el.dataset.mode))}
  document.getElementById('langBtn').onclick=()=>api.toggleLang(); document.getElementById('contrastBtn').onclick=()=>api.bumpFont(); document.getElementById('closeModal').onclick=()=>document.getElementById('modal').classList.remove('show'); document.getElementById('modal').onclick=e=>{if(e.target.id==='modal')document.getElementById('modal').classList.remove('show')};
  bus.addEventListener('change', render); render();
})();
  if ('serviceWorker' in navigator && location.protocol !== 'file:') { navigator.serviceWorker.register('./sw.js').catch(() => undefined); }
</script>
